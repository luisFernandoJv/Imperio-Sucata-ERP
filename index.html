<!doctype html>
<html lang="pt-br" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Império Sucata - Gestão Inteligente</title>

    <!-- Theme colors -->
    <meta name="theme-color" content="#ea580c" />
    <meta name="msapplication-TileColor" content="#ea580c">
    
    <!-- PWA Description -->
    <meta name="description" content="Sistema completo de gestão para reciclagem de materiais com controle de estoque, vendas e relatórios">
    
    <!-- PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Império Sucata">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- Favicons - Ordem correta para melhor compatibilidade -->
    <link rel="icon" type="image/svg+xml" href="/favicon_io/ico.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    
    <!-- Android Chrome icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon_io/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon_io/android-chrome-512x512.png">
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/favicon_io/ico.svg" as="image" type="image/svg+xml">
    
  </head>
  <body class="antialiased bg-slate-50 text-slate-900 font-sans">
    <noscript>
      <div style="padding: 2rem; text-align: center; background: #fee; color: #c33;">
        <h1>JavaScript Necessário</h1>
        <p>Este aplicativo requer JavaScript para funcionar. Por favor, habilite o JavaScript no seu navegador.</p>
      </div>
    </noscript>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Remove no-js class for progressive enhancement
      document.documentElement.classList.remove('no-js');
      document.documentElement.classList.add('js');
      
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('[PWA] Service Worker registrado com sucesso:', registration.scope);
              
              // Check for updates periodically
              setInterval(() => {
                registration.update();
              }, 60 * 60 * 1000); // Check every hour
            })
            .catch((error) => {
              console.error('[PWA] Falha ao registrar Service Worker:', error);
            });
        });
      }
      
      // Detect and handle iOS standalone mode
      if (window.navigator.standalone === true) {
        document.documentElement.classList.add('standalone');
      }
    </script>
  </body>
</html>
